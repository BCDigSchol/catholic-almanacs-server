
<div class="maps-wrapper">
  <div class="maps-grid">
    <mat-card class="network-card" (click)="navigate('/institutions/map')" tabindex="0" (keydown.enter)="navigate('/institutions/map')">
      <mat-card-header>
        <mat-icon class="card-icon">account_balance</mat-icon>
      </mat-card-header>
      <mat-card-title>Institutions</mat-card-title>
      <mat-card-content>
        <div class="network-desc">Explore the map of all institutions over time.</div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-stroked-button color="primary" (click)="$event.stopPropagation(); navigate('/institutions/map')">
          View Institutions <mat-icon>arrow_forward</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>

    <mat-card class="network-card" (click)="navigate('/people/map')" tabindex="0" (keydown.enter)="navigate('/people/map')">
      <mat-card-header>
        <mat-icon class="card-icon">groups</mat-icon>
      </mat-card-header>
      <mat-card-title>People</mat-card-title>
      <mat-card-content>
        <div class="network-desc">See where people appeared over time.</div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-stroked-button color="accent" (click)="$event.stopPropagation(); navigate('/people/map')">
          View People <mat-icon>arrow_forward</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>

    <mat-card class="network-card" (click)="navigate('/dioceses/map')" tabindex="0" (keydown.enter)="navigate('/dioceses/map')">
      <mat-card-header>
        <mat-icon class="card-icon">church</mat-icon>
      </mat-card-header>
      <mat-card-title>Dioceses</mat-card-title>
      <mat-card-content>
        <div class="network-desc">Discover the changing shapes of the diocesan network over time.</div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-stroked-button color="accent" (click)="$event.stopPropagation(); navigate('/dioceses/map')">
          View Dioceses <mat-icon>arrow_forward</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
