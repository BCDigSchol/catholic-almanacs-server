

<div class="networks-grid-wrapper">
    <mat-grid-list cols="2" rowHeight="1:1" gutterSize="32px">
        <mat-grid-tile>
            <mat-card class="network-card" (click)="navigate('/networks/institutional')" tabindex="0" (keydown.enter)="navigate('/networks/institutional')">
                <mat-card-header>
                    <mat-icon class="card-icon">account_balance</mat-icon>
                </mat-card-header>
                <mat-card-title>Institutions</mat-card-title>
                <mat-card-content>
                    <div class="network-desc">Explore the network of institutions and their connections through shared people.</div>
                </mat-card-content>
                <mat-card-actions>
                    <button mat-stroked-button color="primary" (click)="$event.stopPropagation(); navigate('/networks/institutional')">
                        View Institutions
                        <mat-icon>arrow_forward</mat-icon>
                    </button>
                </mat-card-actions>
            </mat-card>
        </mat-grid-tile>
        <mat-grid-tile>
            <mat-card class="network-card" (click)="navigate('/networks/personal')" tabindex="0" (keydown.enter)="navigate('/networks/personal')">
                <mat-card-header>
                    <mat-icon class="card-icon">groups</mat-icon>
                </mat-card-header>
                <mat-card-title>People</mat-card-title>
                <mat-card-content>
                    <div class="network-desc">Visualize how people are connected by working at the same institutions.</div>
                </mat-card-content>
                <mat-card-actions>
                    <button mat-stroked-button color="accent" (click)="$event.stopPropagation(); navigate('/networks/personal')">
                        View People
                        <mat-icon>arrow_forward</mat-icon>
                    </button>
                </mat-card-actions>
            </mat-card>
        </mat-grid-tile>
    </mat-grid-list>
</div>
