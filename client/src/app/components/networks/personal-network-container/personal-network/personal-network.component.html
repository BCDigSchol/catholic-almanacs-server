
<div class="network-filter-bar flex flex-row flex-wrap items-center justify-start m-4 gap-2">
  <mat-form-field appearance="fill" style="min-width: 180px; margin-right: 8px;">
    <mat-label>State</mat-label>
    <mat-select [(ngModel)]="state">
      <mat-option *ngFor="let s of usStates" [value]="s.abbr">{{ s.name }}</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="fill" style="min-width: 180px; margin-right: 8px;">
    <mat-label>City</mat-label>
    <input matInput [(ngModel)]="city" placeholder="City name">
  </mat-form-field>

  <mat-form-field appearance="fill" style="min-width: 180px; margin-right: 8px;">
    <mat-label>Diocese</mat-label>
    <input matInput [(ngModel)]="diocese" placeholder="Diocese name">
  </mat-form-field>

  <mat-form-field appearance="fill" style="min-width: 110px; margin-right: 8px;">
    <mat-label>Start Year</mat-label>
    <input matInput type="number" [(ngModel)]="startYear" placeholder="e.g. 1850">
  </mat-form-field>

  <mat-form-field appearance="fill" style="min-width: 110px; margin-right: 8px;">
    <mat-label>End Year</mat-label>
    <input matInput type="number" [(ngModel)]="endYear" placeholder="e.g. 1900">
  </mat-form-field>

  <button mat-raised-button color="primary" (click)="fetchNetwork()" [disabled]="loading">
    Filter
  </button>
</div>

<app-network-graph
  label="People linked through institutions"
  [data]="network"
  [options]="networkOptions"
  [startYear]="startYear"
  [endYear]="endYear"
  [timeWindowLoading]="loading"
  (timeWindowChange)="onTimeWindowChange($event)">
</app-network-graph>
